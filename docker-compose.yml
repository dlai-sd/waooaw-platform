      MCP_PORT: "8101"
      MCP_STUB_MESSAGE: "STUB — Agmarknet API integration pending"

    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8101/health || exit 1"]
      interval: 15s
      retries: 3

  whatsapp-voice-mcp:
    # WhatsApp Business Cloud API — audio message ingestion + TTS delivery
    # Used by: Agricultural Advisory Agent (AD-015: voice-primary interface)
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: whatsapp-voice-mcp-stub
      MCP_TOOLS: '["receive_voice_message", "send_voice_message", "transcribe_audio"]'
      MCP_PORT: "8102"
      MCP_STUB_MESSAGE: "STUB — WhatsApp Business API credentials required"

    ports:
      - "8102:8102"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8102/health || exit 1"]
      interval: 15s
      retries: 3

  broker-api-mcp:
    # Broker API adapter — Zerodha Kite / ICICI Direct / Angel One (configurable)
    # Used by: Trading Agent. BROKER_API_ACCESS_VERIFIED required in always-ask actions.
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: broker-api-mcp-stub
      MCP_TOOLS: '["place_order", "get_positions", "get_portfolio", "get_market_data", "cancel_order", "get_ohlcv", "get_option_chain"]'
      MCP_PORT: "8103"
      MCP_STUB_MESSAGE: "STUB — broker credentials and SEBI registration required"

    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8103/health || exit 1"]
      interval: 15s
      retries: 3

  whatsapp-business-mcp:
    # WhatsApp Business API — text/media messaging
    # Used by: Digital Marketing Agent (Skill 7: WhatsApp Business Engagement)
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
