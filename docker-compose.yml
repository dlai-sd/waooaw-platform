    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8107/health || exit 1"]
      interval: 15s
      retries: 3

  google-business-mcp:
    # Google Business Profile API (customer OAuth)
    # Used by: Digital Marketing Agent (Skill 6)
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: google-business-mcp-stub
      MCP_TOOLS: '["get_reviews", "post_update", "get_insights"]'
      MCP_PORT: "8108"
      MCP_STUB_MESSAGE: "STUB — Google Business Profile OAuth required"

    ports:
