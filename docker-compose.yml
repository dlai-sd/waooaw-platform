    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: scheduling-mcp-stub
      MCP_TOOLS: '["calendar.get_history", "calendar.create_plan", "calendar.schedule_post"]'
      MCP_PORT: "8105"
