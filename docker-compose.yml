services:

  # ─── Test Runner (C-080 — Docker Test Isolation mandate) ─────────────────
  # ALL tests execute here. Virtual environments are PROHIBITED (C-080).
  # Usage:
  #   docker compose run --rm test-runner pytest tests/
  #   docker compose run --rm test-runner pytest tests/constitutional/ -v
  #   docker compose run --rm test-runner python3 -m py_compile scripts/*.py
  #   docker compose run --rm test-runner ruff check .
  # The test-runner image IS the test execution environment — no venv, no host Python.
  test-runner:
    build:
      context: .
      dockerfile: architecture/reference/dockerfiles/Dockerfile.test-runner
    volumes:
      - .:/workspace                    # bind mount for local dev — code changes reflected immediately
      - /var/run/docker.sock:/var/run/docker.sock  # testcontainers: access to Docker daemon
    environment:
      DATABASE_URL: postgresql://waooaw:${POSTGRES_PASSWORD}@postgres:5432/waooaw_test
      PYTHONPATH: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test                            # only starts when --profile test is specified
    # No ports — test-runner is not a server, it's an on-demand command executor

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: waooaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waooaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waooaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── PgBouncer — connection pooling (O-05, ADR-027) ──────────────────────
  # All application services connect via PgBouncer (port 5433), NOT directly to PostgreSQL.
  # Exception: Keycloak connects directly (5432) — Keycloak has its own connection management.
  # Exception: Temporal connects directly (5432) — Temporal manages its own pool.
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    ports:
      - "5433:5433"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: waooaw
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_QUERY_WAIT_TIMEOUT: 5
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 300
      # Auth — password passed at runtime (ADR-014: no secrets in compose)
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_AUTH_USER: waooaw
      PGBOUNCER_AUTH_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5433 -U waooaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    command: start-dev --import-realm
    ports:
      - "8443:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/waooaw
      KC_DB_USERNAME: waooaw
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
    volumes:
      - ./infrastructure/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: waooaw
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig.yaml
    volumes:
      - ./infrastructure/temporal:/etc/temporal
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ─── Ollama — LOCAL tier LLM (ADR-029 — multi-model) ─────────────────────
  # Hosts two models for local dev:
  #   1. llama3.2:3b          — classification gate (ADR-024 Layer 1, ZERO_COST path)
  #   2. ai4bharat/indic-bert — Indian language classification + C-042 vocab check
  # In dev: CPU-only mode (no GPU required, slightly slower embedding)
  # In cloud: GPU node pool added at 200+ customers (Terraform variable gpu_node_pool)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Pull required models on startup (runs once; idempotent on restart)
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "ollama pull llama3.2:3b &&
       echo 'Pulling AI4Bharat IndicBERT (GGUF format)...' &&
       ollama pull hf.co/ai4bharat/indic-bert:latest ||
       echo 'AI4Bharat pull failed — will retry on next startup. Using llama3.2 as fallback for classification.'"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"  # Pull once; do not restart loop

  # ─── Application Services ──────────────────────────────────────────────────

  constitutional-engine:
    build:
      context: ./src/constitutional-engine
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=waooaw;Username=constitutional_app;Password=${POSTGRES_PASSWORD}"
      OTLP_ENDPOINT: http://jaeger:4317
      GRPC_PORT: "5002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Dev: TCP port check (nc). Production Dockerfile installs grpc_health_probe.
      # See architecture/reference/dockerfiles/Dockerfile.dotnet-service for full spec.
      test: ["CMD-SHELL", "nc -z localhost 5002 || exit 1"]
      interval: 10s
      retries: 5

  business-platform:
    build:
      context: ./src/business-platform
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=waooaw;Username=business_app;Password=${POSTGRES_PASSWORD}"
      ConstitutionalEngine__Address: http://constitutional-engine:5002
      Temporal__Address: temporal:7233
      Keycloak__Authority: http://keycloak:8080/realms/waooaw
      Keycloak__Audience: waooaw-platform
      OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      constitutional-engine:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      retries: 5

  professional-runtime:
    build:
      context: ./src/professional-runtime
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://runtime_app:${POSTGRES_PASSWORD}@postgres:5432/waooaw"
      CONSTITUTIONAL_ENGINE_ADDRESS: constitutional-engine:5002
      AI_RUNTIME_URL: http://ai-runtime:5004
      BUSINESS_PLATFORM_URL: http://business-platform:5001
      TEMPORAL_ADDRESS: temporal:7233
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/waooaw/protocol/openid-connect/certs
      OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      constitutional-engine:
        condition: service_healthy
      business-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5003/health || exit 1"]
      interval: 10s
      retries: 5

  ai-runtime:
    build:
      context: ./src/ai-runtime
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://runtime_app:${POSTGRES_PASSWORD}@postgres:5432/waooaw"
      # ── LLM Provider config (ADR-029 — Multi-Provider Strategy) ────────────
      # LOCAL tier
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLAMA_MODEL: ${OLLAMA_LLAMA_MODEL:-llama3.2:3b}
      OLLAMA_INDIC_MODEL: ${OLLAMA_INDIC_MODEL:-ai4bharat/indic-bert}
      # MID_TIER primary: Google Gemini 2.0 Flash (Vertex AI asia-south1)
      GOOGLE_VERTEX_PROJECT_ID: ${GOOGLE_VERTEX_PROJECT_ID:-placeholder-fa021-required}
      GOOGLE_VERTEX_REGION: ${GOOGLE_VERTEX_REGION:-asia-south1}
      GOOGLE_VERTEX_SA_KEY: ${GOOGLE_VERTEX_SA_KEY:-{}}
      MID_TIER_MODEL_PRIMARY: ${MID_TIER_MODEL_PRIMARY:-gemini-2.0-flash}
      # MID_TIER Agricultural override: Sarvam AI Saaras (C-042 compliance)
      SARVAM_API_KEY: ${SARVAM_API_KEY:-placeholder-fa022-required}
      MID_TIER_MODEL_AGRI: ${MID_TIER_MODEL_AGRI:-sarvam-saaras-1.0}
      # MID_TIER fallback: Azure OpenAI GPT-4o-mini (UAE North)
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-https://waooaw-ai.openai.azure.com/}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-placeholder}
      # FRONTIER primary: Google Gemini 2.5 Pro (Vertex AI asia-south1)
      STEWARD_FRONTIER_MODEL: ${STEWARD_FRONTIER_MODEL:-gemini-2.5-pro}
      # FRONTIER fallback: Azure OpenAI GPT-4o (UAE North) — circuit-breaker only
      AZURE_FRONTIER_MODEL: ${AZURE_FRONTIER_MODEL:-gpt-4o}
      # Legacy single-provider vars (kept for backward compat — PSE overrides these)
      LLM_PROVIDER: ${LLM_PROVIDER:-google_vertex}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      OTLP_ENDPOINT: http://jaeger:4317
      # MCP server endpoints (internal network, C-041: validated before every tool call)
      # Agricultural Advisory Agent MCPs
      MCP_WEATHER_ENSEMBLE_URL: http://weather-ensemble-mcp:8100
      MCP_AGMARKNET_URL: http://agmarknet-mcp:8101
      MCP_WHATSAPP_VOICE_URL: http://whatsapp-voice-mcp:8102
      # Trading Agent MCPs
      MCP_BROKER_API_URL: http://broker-api-mcp:8103
      # Digital Marketing Agent — Phase 1 MCPs (Curtain Raiser)
      MCP_WHATSAPP_BUSINESS_URL: http://whatsapp-business-mcp:8104
      MCP_SCHEDULING_URL: http://scheduling-mcp:8105
      MCP_INSTAGRAM_URL: http://instagram-mcp:8106
      MCP_FACEBOOK_URL: http://facebook-mcp:8107
      MCP_GOOGLE_BUSINESS_URL: http://google-business-mcp:8108
      MCP_PLATFORM_ANALYTICS_URL: http://platform-analytics-mcp:8109
      MCP_IMAGE_GENERATION_URL: http://image-generation-mcp:8110
      MCP_VIDEO_GENERATION_URL: http://video-generation-mcp:8111
      # Digital Marketing Agent — v2.0 Intelligence + Phase 2/3 MCPs
      MCP_CUSTOMER_PROFILE_URL: http://customer-profile-mcp:8112
      MCP_WEB_SEARCH_URL: http://web-search-mcp:8113
      MCP_GOOGLE_PLACES_URL: http://google-places-mcp:8114
      MCP_SOCIAL_PROFILE_URL: http://social-profile-mcp:8115
      MCP_META_AD_LIBRARY_URL: http://meta-ad-library-mcp:8116
      MCP_WEB_SCAN_URL: http://web-scan-mcp:8117
      MCP_SEO_URL: http://seo-mcp:8118
      MCP_GOOGLE_SEARCH_CONSOLE_URL: http://google-search-console-mcp:8119
      MCP_META_ADS_URL: http://meta-ads-mcp:8120
      MCP_GOOGLE_ADS_URL: http://google-ads-mcp:8121
      MCP_WEB_OPTIMISATION_URL: http://web-optimisation-mcp:8122
      # ── DMA v3.0 NEW MCPs (2026-07-19 gap bridge) ────────────────────────
      # YouTube Operations (Skill 8 video publish + analytics — youtube-mcp)
      MCP_YOUTUBE_URL: http://youtube-mcp:8141
      # Google Analytics 4 cross-channel attribution (Skill 9 — ga4-mcp)
      MCP_GOOGLE_ANALYTICS_URL: http://ga4-mcp:8142
      # Instagram DM + lead qualification (Skill 7b — instagram-messaging-mcp)
      MCP_INSTAGRAM_MESSAGING_URL: http://instagram-messaging-mcp:8143
      # Instagram comment management (Skill 7b — instagram-comments-mcp)
      MCP_INSTAGRAM_COMMENTS_URL: http://instagram-comments-mcp:8144
      # Appointment booking system (Skill 7b + 16 — booking-mcp: Practo/Fresha/Mindbody/Calendly/native)
      MCP_BOOKING_URL: http://booking-mcp:8146
      # India reputation management (Skill 14 — Practo/Justdial/Sulekha + Zomato/Swiggy for restaurants)
      MCP_REPUTATION_URL: http://reputation-mcp:8145
      # CMS integration for blog publishing (Skill 10 — cms-mcp: WordPress/Squarespace)
      MCP_CMS_URL: http://cms-mcp:8147
      # WhatsApp Flows + WhatsApp Pay (Skill 7 extensions)
      MCP_WHATSAPP_FLOWS_URL: http://whatsapp-flows-mcp:8148
      # Restaurant delivery platforms (zomato-mcp + swiggy-mcp — domain: restaurant)
      MCP_ZOMATO_URL: http://zomato-mcp:8149
      MCP_SWIGGY_URL: http://swiggy-mcp:8150
      # ─────────────────────────────────────────────────────────────────────
      # Infrastructure services (ADR-021 OAuth, ADR-022 Razorpay, notifications, PDF, email)
      OAUTH_VAULT_URL: http://oauth-vault:8130
      MCP_RAZORPAY_URL: http://razorpay-mcp:8131
      MCP_PDF_GENERATION_URL: http://pdf-generation-mcp:8123
      MCP_EMAIL_URL: http://email-mcp:8124
      MCP_PUSH_NOTIFICATION_URL: http://push-notification-mcp:8125
      # AI Agent Execution Layer (v0.20.0 — C-047, AD-018, AD-019)
      MCP_PLATFORM_OPERATIONS_URL: http://platform-operations-mcp:8126
      PROMPT_REGISTRY_URL: http://prompt-registry-mcp:8127
      # Trading Agent MCPs
      MCP_MARKET_DATA_URL: http://market-data-mcp:8132
      MCP_CRYPTO_EXCHANGE_URL: http://crypto-exchange-mcp:8133
      MCP_NSE_CALENDAR_URL: http://nse-calendar-mcp:8134
      # Agricultural Advisor MCPs (additional)
      MCP_ENAM_URL: http://enam-mcp:8135
      MCP_GOVERNMENT_SCHEME_URL: http://government-scheme-mcp:8136
      # Phone Identity Service (ADR-023 — WhatsApp-native identity for C-042 agents)
      PHONE_IDENTITY_SERVICE_URL: http://phone-identity-service:8137
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-stub}
      META_APP_SECRET: ${META_APP_SECRET:-stub}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5004/health || exit 1"]
      interval: 10s
      retries: 5

  # =============================================================================
  # MCP Integration Layer (ADR-020) — dev stubs
  # All MCP servers: stateless adapters only. No business logic.
  # C-041: CE.ValidateAction called by ai-runtime BEFORE any tool invocation.
  # =============================================================================

  weather-ensemble-mcp:
    # 5-source ensemble: IMD, OpenWeatherMap, ECMWF, Weather.gov, AccuWeather
    # Used by: Agricultural Advisory Agent (AS-005 — 10km hyperlocal alerts)
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: weather-ensemble-mcp-stub
      MCP_TOOLS: '["get_ensemble_forecast", "get_current_conditions", "get_crop_risk_assessment"]'
      MCP_PORT: "8100"
      MCP_STUB_MESSAGE: "STUB — real implementation requires API keys"

    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 15s
      retries: 3

  agmarknet-mcp:
    # Agmarknet + eNAM price data for mandi price intelligence (capability 10.3)
    # Used by: Agricultural Advisory Agent
    image: python:3.12-slim
    command: sh -c "pip install fastapi uvicorn --quiet && python /stub/mcp_stub_server.py"
    volumes:
      - ./scripts/mcp_stub_server.py:/stub/mcp_stub_server.py:ro
    environment:
      MCP_SERVICE_NAME: agmarknet-mcp-stub
