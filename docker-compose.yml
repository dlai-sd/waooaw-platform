    environment:
      MCP_SERVICE_NAME: whatsapp-business-mcp-stub
      MCP_TOOLS: '["send_campaign_message", "get_message_analytics", "create_template"]'
      MCP_PORT: "8104"
      MCP_STUB_MESSAGE: "STUB — WhatsApp Business credentials required"

