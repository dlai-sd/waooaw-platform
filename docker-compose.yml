app = FastAPI(title='google-places-mcp-stub')
@app.get('/health')
def health(): return {'status': 'ok', 'stub': True}
@app.get('/tools')
def tools(): return {'tools': ['place.get_details', 'place.get_categories']}
@app.post('/call/{tool_name}')
def call(tool_name: str, body: dict = {}): return {'tool': tool_name, 'result': 'STUB — Google Places API key required', 'stub': True}
uvicorn.run(app, host='0.0.0.0', port=8114)
\""
    ports:
      - "8114:8114"
    environment:
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-stub}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8114/health || exit 1"]
      interval: 15s
      retries: 3

