# PgBouncer configuration for WAOOAW
# Optimization: ADR-027 O-05 — Connection pooling
# Implements: infrastructure/postgres/pgbouncer/pgbouncer.ini
# Constitutional basis: C-059 (Implementation Traceability)
#
# Why PgBouncer:
#   PostgreSQL default max_connections = 100.
#   4 services × up to 10 replicas × 5 connections each = 200 connections needed.
#   Without pooling: connections rejected at scale. With PgBouncer: 10-20 real connections
#   serve hundreds of application connections via multiplexing.
#
# Mode: transaction pooling (best for WAOOAW's short-lived CE validation calls)
#   session pooling: one server conn per client session (too many connections)
#   transaction pooling: server conn released after each transaction (ideal for WAOOAW)
#   statement pooling: too aggressive — breaks multi-statement transactions

[databases]
# Route all connections through PgBouncer to the real PostgreSQL
waooaw = host=postgres port=5432 dbname=waooaw

[pgbouncer]
# Listen on all interfaces within the Docker network
listen_addr = 0.0.0.0
listen_port = 5433

# Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# Pooling mode — transaction is ideal for WAOOAW's short CE gRPC calls
pool_mode = transaction

# Connection pool sizes
# max_client_conn: max simultaneous client connections (application connections)
max_client_conn = 200

# default_pool_size: real PostgreSQL connections per user/db pair
# 4 services × 5 real connections each = 20; keep some headroom
default_pool_size = 25

# Reserve connections for emergencies (Constitutional Engine ValidateAction)
reserve_pool_size = 5
reserve_pool_timeout = 3

# Timeout settings
# server_idle_timeout: close idle server connections after this long
server_idle_timeout = 300

# client_idle_timeout: close idle client connections
client_idle_timeout = 60

# query_wait_timeout: fail fast if no connection available (don't let CE block)
query_wait_timeout = 5

# Keep alive (seconds)
server_lifetime = 3600

# Logging — structured for OTel/Azure Monitor
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Admin interface — for monitoring
admin_users = waooaw_admin
stats_users = waooaw_admin

# TLS — disabled within Docker network (Container Apps mTLS handles cloud)
server_tls_sslmode = disable
client_tls_sslmode = disable
