// constitutional_service.proto
//
// API Contract: Constitutional Engine gRPC Service
//
// Produced by:  Solution Architect (Sprint 006 — CA-R004-01 finding)
// Date:         2026-07-07
// ADR:          ADR-001 (gRPC for Constitutional Engine)
// Constitutional Basis:
//   C-023 (Evidence First — every action requires CE to confirm before caller returns success)
//   C-027 (append-only ledger — RecordEvidence is INSERT only, never UPDATE)
//   C-003 (authority licensed — ValidateAction enforces Decision Space boundary)
//   C-013 (Emergency Override — TriggerEmergencyStop is a Constitutional Floor)
//   AD-001 (Emergency Stop ≤250ms end-to-end)
//   AD-008 (every permission decision must name its constitutional basis)
//
// ─── TRANSPORT NOTES ────────────────────────────────────────────────────────
//
// This service is INTERNAL ONLY. It is never exposed to the internet.
// It communicates only with Business Platform and Professional Runtime.
//
// Tenant isolation is carried via gRPC metadata, NOT request fields:
//   Metadata key: "x-tenant-id"
//   Value:        UUID extracted from the caller's JWT (propagated by Business Platform
//                 and Professional Runtime from the customer's JWT claim)
//   Enforcement:  Constitutional Engine reads this metadata on every RPC call and
//                 writes it as tenant_id on every evidence record.
//   If metadata is absent or invalid → gRPC error UNAUTHENTICATED
//
// All UUIDs are transmitted as strings in canonical format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
//
// ─── LATENCY BUDGET ─────────────────────────────────────────────────────────
//
// RecordEvidence (standard):        target < 80ms   (AD-005 PAAS budget allocation)
// ValidateAction (PAAS hot path):   target < 40ms   (AD-005: leaves 10ms for caller overhead)
// TriggerEmergencyStop:             target < 100ms  (AD-001: 250ms total; 50ms network; 100ms here)
//
// ────────────────────────────────────────────────────────────────────────────

syntax = "proto3";

package constitutional.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Waooaw.ConstitutionalEngine.Grpc";

// ─── SERVICE DEFINITION ─────────────────────────────────────────────────────

service ConstitutionalService {

  // RecordEvidence — Evidence First Enforcer
  // Writes an evidence record to the Constitutional Audit Ledger atomically.
  // The caller MUST NOT return success to its own client until this RPC returns OK.
  // On any error response, the caller MUST treat its own operation as failed.
  // C-023, AD-002
  rpc RecordEvidence(RecordEvidenceRequest) returns (RecordEvidenceResponse);

  // ValidateAction — PAAS Boundary Validator
  // Validates whether a proposed action falls within the current Decision Space.
  // Called by Professional Runtime on every PAAS action before execution.
  // Returns ALLOW, DENY, or ESCALATE. Does NOT record evidence — caller must
  // call RecordEvidence with the outcome state after this decision.
  // C-003, AD-005
  rpc ValidateAction(ValidateActionRequest) returns (ValidateActionResponse);

  // GrantAuthorityLicense — Authority License Manager (expansion)
  // Records an authority expansion event in the Constitutional Audit Ledger.
  // Caller must supply evidence IDs that justify the expansion.
  // C-003, C-023
  rpc GrantAuthorityLicense(GrantAuthorityRequest) returns (GrantAuthorityResponse);

  // RevokeAuthorityLicense — Authority License Manager (restriction)
  // Records an authority restriction or suspension event.
  // C-003, C-023
  rpc RevokeAuthorityLicense(RevokeAuthorityRequest) returns (RevokeAuthorityResponse);

  // EvaluatePolicy — Policy Evaluator
  // General-purpose constitutional policy evaluation.
  // Returns a decision with the constitutional basis string required for audit records.
  // AD-008 (every permission decision must name its constitutional basis)
  rpc EvaluatePolicy(EvaluatePolicyRequest) returns (EvaluatePolicyResponse);

  // TriggerEmergencyStop — Emergency Stop Handler
  // Records the Emergency Stop event and signals all affected sessions to halt.
  // MUST complete within the latency budget (see header).
  // Caller MUST NOT return halt confirmation until this RPC returns OK.
  // C-013, AD-001
  rpc TriggerEmergencyStop(EmergencyStopRequest) returns (EmergencyStopResponse);
}

// ─── ENUMERATIONS ───────────────────────────────────────────────────────────

// EvidenceState — the state of a single evidence record in the Constitutional Audit Ledger.
// Matches the evidence_state DB enum defined in evidence-schema.md.
// IMPORTANT: each state is a new INSERT; transitions do not UPDATE existing records (C-027).
enum EvidenceState {
  EVIDENCE_STATE_UNSPECIFIED    = 0;  // invalid — must never be stored
  EVIDENCE_STATE_PROPOSED       = 1;  // action has been proposed; shadow trial begins (C-028)
  EVIDENCE_STATE_AWAITING_APPROVAL = 2; // presented to customer for approval decision
  EVIDENCE_STATE_APPROVED       = 3;  // customer approved; execution may proceed
  EVIDENCE_STATE_REJECTED       = 4;  // customer rejected; execution is prohibited
  EVIDENCE_STATE_EXECUTED       = 5;  // action executed; constitutional record complete
  EVIDENCE_STATE_ABANDONED      = 6;  // Emergency Stop fired; action constitutionally terminated
}

// ValidationDecision — the PAAS boundary validation outcome.
enum ValidationDecision {
  VALIDATION_DECISION_UNSPECIFIED = 0;
  VALIDATION_DECISION_ALLOW       = 1;  // action is within Decision Space; proceed
  VALIDATION_DECISION_DENY        = 2;  // action is outside Decision Space; halt
  VALIDATION_DECISION_ESCALATE    = 3;  // action is at scope boundary; route to customer
}

// PolicyDecision — the general policy evaluation outcome.
enum PolicyDecision {
  POLICY_DECISION_UNSPECIFIED = 0;
  POLICY_DECISION_PERMIT      = 1;
  POLICY_DECISION_DENY        = 2;
  POLICY_DECISION_ESCALATE    = 3;  // requires customer confirmation
}

// ─── RecordEvidence ──────────────────────────────────────────────────────────

message RecordEvidenceRequest {
  // action_instance_id groups all evidence records for one logical action attempt.
  // Generated by the caller when creating the PROPOSED record; reused for all
  // subsequent state transitions on the same action.
  // See evidence-schema.md — action_instance_id specification.
  string action_instance_id = 1;

  // contract_id identifies the Employment Contract this evidence belongs to.
  string contract_id        = 2;

  // professional_id identifies the Digital Professional that performed the action.
  string professional_id    = 3;

  // action_type is a string identifier for the type of action being recorded.
  // Examples: "MARKETING_POST", "CALENDAR_INVITE", "TRADE_ORDER", "EMERGENCY_STOP",
  //           "SCOPE_BOUNDARY_CONFIRMATION", "AUTHORITY_GRANT"
  string action_type        = 4;

  // state is the evidence state this record represents.
  // The Constitutional Engine validates the transition before writing (evidence-schema.md).
  EvidenceState state       = 5;

  // proposed_content is the action content as proposed (before customer approval).
  // Present for PROPOSED state. Optional for others.
  // Serialized as JSON string.
  optional string proposed_content = 6;

  // executed_content is the action content as executed (may differ from proposed).
  // Present for EXECUTED state. Optional for others.
  // Serialized as JSON string.
  optional string executed_content = 7;

  // is_scope_boundary indicates this action crosses or approaches a scope boundary.
  // When true, scope_boundary_name must be set.
  bool is_scope_boundary    = 8;

  // scope_boundary_name names the specific scope boundary crossed.
  // Required when is_scope_boundary = true.
  optional string scope_boundary_name = 9;

  // scope_boundary_acknowledgment is the customer's explicit acknowledgment text
  // for scope boundary confirmations.
  // Required for SCOPE_BOUNDARY_CONFIRMATION action type in EXECUTED state.
  optional string scope_boundary_acknowledgment = 10;

  // decision_space_version is the version of the Decision Space active at the time
  // this action was proposed. Used to detect stale Decision Spaces mid-session.
  int32 decision_space_version = 11;

  // constitutional_basis names the specific constitutional authority for this record.
  // Format: semicolon-separated list of claim/precedent/driver references.
  // Example: "C-023; AD-002"
  // See evidence-schema.md — Constitutional Basis Field Specification.
  // Must not be empty. CE returns INVALID_ARGUMENT if empty.
  string constitutional_basis = 12;
}

message RecordEvidenceResponse {
  // evidence_record_id is the UUID assigned to this specific record in the ledger.
  string evidence_record_id = 1;

  // recorded_at is the timestamp when the record was written to the ledger.
  google.protobuf.Timestamp recorded_at = 2;
}

// ─── ValidateAction ──────────────────────────────────────────────────────────

message ValidateActionRequest {
  string contract_id = 1;
  string action_type = 2;
  string action_parameters = 3;
  int32 decision_space_version = 4;
  optional BudgetContext budget_context = 5;
  optional SyntheticApprovalContext synthetic_approval_context = 6;
  ApprovalType approval_type = 7;
  optional string skill_id = 8;
  // reasoning_trace_id: the ID of the reasoning trace produced BEFORE this call (C-047, AD-019).
  // The agent must write the reasoning trace first, then call ValidateAction with its ID.
  // CE uses this for EvaluatePolicy constitutional reasoning context.
  // Required when the decision requires EvaluatePolicy (novel actions, boundary cases).
  optional string reasoning_trace_id = 9;
}

// BudgetContext — carries financial spend state for budget ceiling enforcement.
// C-043 (LAW): budget ceiling is a Constitutional Floor equivalent.
// AD-016: CE must reject any action that would exceed approved_monthly_budget_inr.
message BudgetContext {
  // approved_monthly_budget_inr is the customer-approved ceiling for this skill/month.
  // In Indian Rupees (paise-level precision: store as integer paise).
  int64 approved_monthly_budget_inr_paise = 1;

  // current_month_spend_inr_paise is the total spend already incurred this calendar month.
  int64 current_month_spend_inr_paise = 2;

  // proposed_spend_inr_paise is the spend this action would incur if executed.
  int64 proposed_spend_inr_paise = 3;

  // skill_type identifies which skill is incurring spend (for audit record).
  string skill_type = 4;
}

// SyntheticApprovalContext — carries confidence parameters for synthetic approval validation.
// C-044 (LAW): synthetic approvals require confidence >= customer-configured threshold.
// AD-017: CE must deny if confidence < threshold or history_count < min_history.
message SyntheticApprovalContext {
  // confidence_score is the computed vector similarity score (0.0 to 1.0).
  float confidence_score = 1;

  // configured_threshold is the customer-configured minimum confidence (from skill_runtime_configurations).
  float configured_threshold = 2;

  // prior_approval_count is the count of prior approved actions of this type.
  int32 prior_approval_count = 3;

  // min_history_required is the customer-configured minimum history count.
  int32 min_history_required = 4;

  // basis_approval_ids lists the top-N prior evidence record IDs used for inference.
  // CE stores these in the synthetic_approval_records table.
  repeated string basis_approval_ids = 5;

  // action_description is a plain-language description of the synthetically approved action.
  // Stored in synthetic_approval_records for audit.
  string action_description = 6;

  // override_window_hours is the customer-configured override window for this action.
  int32 override_window_hours = 7;
}

// ApprovalType — the type of approval being validated or recorded.
enum ApprovalType {
  APPROVAL_TYPE_UNSPECIFIED         = 0;
  APPROVAL_TYPE_CUSTOMER_EXPLICIT   = 1;  // customer manually approved
  APPROVAL_TYPE_CALENDAR_AUTHORIZED = 2;  // within approved content calendar
  APPROVAL_TYPE_SYNTHETIC           = 3;  // skill-generated from preference model (C-044)
  APPROVAL_TYPE_PRE_AUTHORIZED      = 4;  // pre-authorized class at contract formation
}

message ValidateActionResponse {
  // decision is the validation outcome: ALLOW, DENY, or ESCALATE.
  ValidationDecision decision = 1;

  // constitutional_basis is the claim/driver reference that produced this decision.
  // Must be passed as constitutional_basis when calling RecordEvidence for this action.
  string constitutional_basis = 2;

  // reason is a human-readable explanation of the decision.
  // For DENY: names the specific violated constraint.
  // For ESCALATE: names the scope boundary.
  // Special deny reasons (developer must handle):
  //   BUDGET_CEILING_REACHED         — C-043: proposed spend would exceed monthly ceiling
  //   SYNTHETIC_CONFIDENCE_BELOW_THRESHOLD — C-044/AD-017: confidence below configured threshold
  //   SYNTHETIC_HISTORY_INSUFFICIENT — C-044: prior approval history below minimum
  //   APPROVAL_MODE_MISMATCH         — caller sent synthetic context but skill is not in SYNTHETIC_APPROVAL mode
  string reason = 3;

  // budget_remaining_inr_paise is returned when the decision involves budget evaluation.
  // Absent for non-spend actions. Present for ALLOW (remaining after proposed spend) and DENY.
  optional int64 budget_remaining_inr_paise = 4;

  // synthetic_approval_record_id is returned when CE creates the synthetic approval record.
  // Only set when approval_type = SYNTHETIC and decision = ALLOW.
  // The caller must store this ID in the synthetic_approval_records table extension.
  optional string synthetic_approval_record_id = 5;
}

// ─── GrantAuthorityLicense ───────────────────────────────────────────────────

message GrantAuthorityRequest {
  // contract_id identifies the Employment Contract receiving the authority expansion.
  string contract_id = 1;

  // new_authority_level is the authority level after this grant.
  int32 new_authority_level = 2;

  // granted_by is the customer user ID making the grant decision.
  string granted_by = 3;

  // evidence_ids lists the evidence records that justify this grant.
  // The CE validates these IDs belong to the same contract.
  // At least one evidence ID is required (C-003: authority earned through evidence).
  repeated string evidence_ids = 4;

  // constitutional_basis names the authority for this grant.
  string constitutional_basis = 5;
}

message GrantAuthorityResponse {
  // license_id is the UUID of the authority_licenses record created.
  string license_id = 1;

  google.protobuf.Timestamp recorded_at = 2;
}

// ─── RevokeAuthorityLicense ──────────────────────────────────────────────────

message RevokeAuthorityRequest {
  // contract_id identifies the Employment Contract being restricted.
  string contract_id = 1;

  // new_authority_level is the authority level after this restriction.
  int32 new_authority_level = 2;

  // revoked_by is the customer user ID making the restriction decision.
  string revoked_by = 3;

  // reason is the justification for the restriction.
  string reason = 4;

  // constitutional_basis names the authority for this restriction.
  string constitutional_basis = 5;
}

message RevokeAuthorityResponse {
  string license_id = 1;

  google.protobuf.Timestamp recorded_at = 2;
}

// ─── EvaluatePolicy ──────────────────────────────────────────────────────────

message EvaluatePolicyRequest {
  // contract_id identifies the Employment Contract whose policy applies.
  string contract_id = 1;

  // action_type is the type of action being evaluated.
  string action_type = 2;

  // action_context contains action-specific context in JSON format.
  string action_context = 3;
}

message EvaluatePolicyResponse {
  // decision is the policy outcome.
  PolicyDecision decision = 1;

  // constitutional_basis names the claim/driver that produced this decision.
  // This string MUST be used as constitutional_basis in the subsequent RecordEvidence call.
  string constitutional_basis = 2;

  // rationale is a human-readable explanation for audit purposes.
  string rationale = 3;
}

// ─── TriggerEmergencyStop ────────────────────────────────────────────────────

message EmergencyStopRequest {
  // contract_id identifies the Employment Contract being stopped.
  // All active PAAS sessions and approval-gate work items under this contract are halted.
  string contract_id = 1;

  // stopped_by is the customer user ID exercising the Emergency Stop.
  string stopped_by = 2;

  // active_session_ids lists the known active PAAS session IDs to halt.
  // If empty, CE halts all active sessions it can identify for the contract.
  repeated string active_session_ids = 3;
}

message EmergencyStopResponse {
  // emergency_stop_record_id is the UUID of the Emergency Stop evidence record.
  // This ID must be referenced in the constitutional_basis of all ABANDONED
  // evidence records created for in-flight actions.
  // Format: "EMERGENCY_STOP:<uuid>" — see evidence-schema.md.
  string emergency_stop_record_id = 1;

  // affected_sessions lists the session IDs that were signalled to halt.
  repeated string affected_sessions = 2;

  // recorded_at is when the Emergency Stop event record was written.
  // The caller MUST NOT return halt confirmation until this timestamp is set.
  google.protobuf.Timestamp recorded_at = 3;
}
