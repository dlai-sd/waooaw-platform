# CI Pipeline — runs on every PR to main
# Constitutional basis: GENESIS Engineering Quality Mandate; ADR-013
# Purpose: Build images, run unit tests, SAST, OpenAPI/proto lint.
#          PR is blocked from merge if any step fails.
#
# This pipeline does NOT deploy. Deployment is triggered by merge (promote.yaml).

name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ─── Build all 5 images ───────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: constitutional-engine
            context: src/constitutional-engine
          - name: business-platform
            context: src/business-platform
          - name: professional-runtime
            context: src/professional-runtime
          - name: ai-runtime
            context: src/ai-runtime
          - name: web
            context: web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ matrix.service.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Secret detection ─────────────────────────────────────────────────────
  secrets:
    name: Secret detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── .NET unit tests ──────────────────────────────────────────────────────
  test-dotnet:
    name: .NET unit tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        project:
          - src/constitutional-engine
          - src/business-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} --no-restore -warnaserror

      - name: Test
        run: |
          dotnet test ${{ matrix.project }} \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ─── Python unit tests ────────────────────────────────────────────────────
  test-python:
    name: Python unit tests + lint
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - src/professional-runtime
          - src/ai-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev
        working-directory: ${{ matrix.service }}

      - name: Ruff lint + format check
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: ${{ matrix.service }}

      - name: mypy type check
        run: uv run mypy --strict .
        working-directory: ${{ matrix.service }}

      - name: pytest
        run: |
          uv run pytest tests/unit \
            --cov=. \
            --cov-report=xml \
            --cov-fail-under=80
        working-directory: ${{ matrix.service }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── TypeScript tests ─────────────────────────────────────────────────────
  test-web:
    name: Web unit tests + type check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Type check
        run: pnpm tsc --noEmit
        working-directory: web

      - name: ESLint
        run: pnpm eslint . --max-warnings 0
        working-directory: web

      - name: Jest
        run: pnpm jest --coverage --coverageThreshold='{"global":{"lines":70}}'
        working-directory: web

  # ─── OpenAPI spec lint ────────────────────────────────────────────────────
  spec-lint:
    name: OpenAPI + Proto lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Spectral lint — Business Platform OpenAPI
        uses: stoplightio/spectral-action@latest
        with:
          file_glob: 'architecture/reference/api-specs/business-platform.openapi.yaml'

      - name: Spectral lint — Professional Runtime OpenAPI
        uses: stoplightio/spectral-action@latest
        with:
          file_glob: 'architecture/reference/api-specs/professional-runtime.openapi.yaml'

      - name: buf lint — Constitutional Service proto
        uses: bufbuild/buf-action@v1
        with:
          input: architecture/reference/proto

      - name: buf breaking — detect breaking changes
        uses: bufbuild/buf-action@v1
        with:
          input: architecture/reference/proto
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main'

  # ─── Security — SAST ──────────────────────────────────────────────────────
  sast:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: [csharp, python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ─── Container image security scan ───────────────────────────────────────
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        image: [constitutional-engine, business-platform, professional-runtime, ai-runtime, web]
    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_PREFIX }}/${{ matrix.image }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif

  # ─── Dependency vulnerability scanning ───────────────────────────────────
  # Catches vulnerable dependencies BEFORE image build — faster feedback than Trivy alone.
  # Constitutional basis: GENESIS AI Security Mandate (log sanitization + dependency hygiene);
  #                       C-062 (AI Security); security/SECURITY-HEADERS.md
  dep-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: pip-audit — Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r src/professional-runtime/requirements.txt --strict
          pip-audit -r src/ai-runtime/requirements.txt --strict
        continue-on-error: false  # Fail on any vulnerability

      - name: dotnet vulnerable — .NET dependencies
        run: |
          dotnet list src/constitutional-engine package --vulnerable --include-transitive 2>&1 | \
            grep -i "has the following vulnerable packages" && exit 1 || true
          dotnet list src/business-platform package --vulnerable --include-transitive 2>&1 | \
            grep -i "has the following vulnerable packages" && exit 1 || true

      - name: pnpm audit — Node.js dependencies
        run: pnpm audit --audit-level high
        working-directory: web

  # ─── License compliance ───────────────────────────────────────────────────
  # Prevents inadvertent use of GPL/AGPL licensed dependencies in commercial code.
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-licenses — check Python dependency licenses
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GPL;AGPL;LGPL" \
            --packages $(pip install -r src/professional-runtime/requirements.txt -q 2>/dev/null && \
                         pip install -r src/ai-runtime/requirements.txt -q 2>/dev/null && \
                         pip freeze | cut -d= -f1 | tr '\n' ' ')
        continue-on-error: true  # Advisory only — does not block PR (LGPL can be acceptable)
