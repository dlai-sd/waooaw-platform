# Autonomous Sprint Agent — executes sprint tasks every 2 hours
#
# constitutional_basis: C-066 Tier 2A, C-070 Third Instinct, C-001, C-065, C-059
# ib_item: IB-009
# spec: architecture/reference/agents/platform-it-expert-agent.md
#
# AUTHORIZATION: No per-execution human approval (C-066 Tier 2A).
#   IB:AUTHORIZED + WC exists + AUTONOMOUS_HALT: false = proceed.
# HUMAN OVERRIDE (C-001): Set AUTONOMOUS_HALT: true in PROJECT_STATE.md.
# C-065 SDLC SEPARATION:
#   execute job uses GITHUB_TOKEN (author).
#   review job uses REVIEW_APP_TOKEN (reviewer — different GitHub App identity).
#   GitHub platform enforces: same token cannot open AND approve a PR.
#
# FinOps optimization (4 patterns — see sprint-context/README.md):
#   1. RAG Index pre-step: builds sprint-context/index.json before agent runs — ~85% token reduction
#   2. Nested AGENTS.md: scoped context per src/ subdirectory — agent only loads relevant charter
#   3. model_hint routing: 'auto' for trivial tasks, 'reasoning' for architecture decisions
#   4. Hard timeout + retry gate: 30-min job limit; halt at 3 consecutive failures (C-001)

name: Autonomous Sprint Agent

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_task:
        description: 'Force specific task ID (e.g. WC011-01). Overrides state machine.'
        required: false
        type: string
      dry_run:
        description: 'Dry run — plan but do not commit or open PR'
        required: false
        type: boolean
        default: false

env:
  AUTONOMOUS_SPRINT_AGENT: 'true'

jobs:

  # ── Job 0: Pre-flight — HALT check + Sprint Index build ──────────────────
  # FinOps Pattern 1: Build sprint-context/index.json BEFORE agent runs.
  # This maps current task → exact spec files needed. Agent reads this index
  # instead of scanning the full 1,000+ file corpus. ~85% token reduction.
  # FinOps Pattern 4: Hard timeout + consecutive failure gate (C-001).
  preflight:
    name: "Pre-flight: HALT check + Sprint Index (FinOps RAG)"
    runs-on: ubuntu-latest
    timeout-minutes: 5              # Hard limit — index build is fast
    outputs:
      halt:         ${{ steps.halt_check.outputs.halt }}
      task_id:      ${{ steps.index_build.outputs.task_id }}
      model_hint:   ${{ steps.index_build.outputs.model_hint }}
      platform_phase: ${{ steps.halt_check.outputs.platform_phase }}
      consecutive_failures: ${{ steps.halt_check.outputs.consecutive_failures }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check AUTONOMOUS_HALT + consecutive failures (C-001)
        id: halt_check
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          content = Path("constitution/PROJECT_STATE.md").read_text()
          halt_match = re.search(r"autonomous_halt:\s*(true|false)", content)
          halt = halt_match.group(1) if halt_match else "false"

          failures_match = re.search(r"consecutive_failures:\s*(\d+)", content)
          failures = int(failures_match.group(1)) if failures_match else 0

          print(f"  autonomous_halt={halt}, consecutive_failures={failures}")

          # FinOps Pattern 4: Halt at 3 consecutive failures to prevent runaway agent loop
          if halt == "true":
              print("  HALT: AUTONOMOUS_HALT=true in PROJECT_STATE.md — skipping sprint")
              with open("$GITHUB_OUTPUT" if False else "/dev/stdout", "a") as f: pass
              print("halt=true")
          elif failures >= 3:
              print(f"  HALT: {failures} consecutive failures — auto-halt until human review (C-001)")
              print("halt=true")
          else:
              print(f"  GO: autonomous_halt=false, failures={failures}/3")
              print("halt=false")
          print(f"consecutive_failures={failures}")
          EOF

          # Proper GITHUB_OUTPUT write
          HALT=$(python3 -c "
          import re
          content = open('constitution/PROJECT_STATE.md').read()
          halt = re.search(r'autonomous_halt:\s*(true|false)', content)
          failures = re.search(r'consecutive_failures:\s*(\d+)', content)
          phase = re.search(r'platform_phase:\s*(\S+)', content)
          h = halt.group(1) if halt else 'true'
          f = int(failures.group(1)) if failures else 0
          p = phase.group(1).strip('\"\'') if phase else 'SPEC'
          # Halt if: explicit halt=true, OR >=3 failures, OR not IMPLEMENTATION phase
          if h == 'true':
              print('true')
          elif f >= 3:
              print('true')
          elif p != 'IMPLEMENTATION':
              print('true')
          else:
              print('false')
          ")
          PHASE=$(python3 -c "
          import re
          content = open('constitution/PROJECT_STATE.md').read()
          m = re.search(r'platform_phase:\s*(\S+)', content)
          print(m.group(1).strip('\"\'') if m else 'SPEC')
          ")
          FAILURES=$(python3 -c "
          import re
          content = open('constitution/PROJECT_STATE.md').read()
          m = re.search(r'consecutive_failures:\s*(\d+)', content)
          print(m.group(1) if m else '0')
          ")
          echo "halt=$HALT" >> "$GITHUB_OUTPUT"
          echo "consecutive_failures=$FAILURES" >> "$GITHUB_OUTPUT"
          echo "platform_phase=$PHASE" >> "$GITHUB_OUTPUT"
          # Log reason for transparency
          if [ "$HALT" = "true" ]; then
            echo "  Halt reason: autonomous_halt or consecutive_failures>=3 or platform_phase!= IMPLEMENTATION"
            echo "  platform_phase=$PHASE (must be IMPLEMENTATION to execute)"
          fi

      - name: Build Sprint Context Index (FinOps RAG — Pattern 1)
        id: index_build
        if: steps.halt_check.outputs.halt == 'false'
        env:
          FORCE_TASK: ${{ inputs.force_task || '' }}
        run: |
          if [ -n "$FORCE_TASK" ]; then
            python3 scripts/build_sprint_index.py --task "$FORCE_TASK"
          else
            python3 scripts/build_sprint_index.py
          fi

          # Extract task_id and model_hint from generated index
          TASK_ID=$(python3 -c "import json; d=json.load(open('sprint-context/index.json')); print(d['task_id'])")
          MODEL_HINT=$(python3 -c "import json; d=json.load(open('sprint-context/index.json')); print(d['model_hint'])")
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "model_hint=$MODEL_HINT" >> "$GITHUB_OUTPUT"
          echo "  Index built: task=$TASK_ID, model_hint=$MODEL_HINT"

      - name: Upload sprint index as artifact
        if: steps.halt_check.outputs.halt == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sprint-context-index
          path: sprint-context/index.json
          retention-days: 7

  # ── Job 1: Execute sprint tasks (Implementation hat) ─────────────────────
  # C-065: This job is the AUTHOR. Uses GITHUB_TOKEN.
  # FinOps Pattern 3: MODEL_HINT env var routes trivial tasks to 'auto' model tier.
  # FinOps Pattern 4: timeout-minutes=30 hard limit prevents runaway agent loops.
  execute:
    name: "Execute sprint (Platform IT Expert — Implementation)"
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.halt == 'false'
    timeout-minutes: 30             # Hard limit: 30 min max per task (FinOps Pattern 4)
    outputs:
      pr_number:    ${{ steps.runner.outputs.pr_number }}
      halt:         ${{ steps.runner.outputs.halt }}
      result:       ${{ steps.runner.outputs.result }}
      sprint:       ${{ steps.runner.outputs.sprint }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Configure git
        run: |
          git config user.name  "WAOOAW AI Agent - Platform IT Expert"
          git config user.email "platform-it-expert@waooaw.ai"

      - name: Download sprint index artifact
        uses: actions/download-artifact@v4
        with:
          name: sprint-context-index
          path: sprint-context/

      - name: Run autonomous sprint agent
        id: runner
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          FORCE_TASK:    ${{ inputs.force_task || '' }}
          DRY_RUN:       ${{ inputs.dry_run || 'false' }}
          GITHUB_REPO:   ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          # FinOps Pattern 3: model hint from preflight — runner logs this for observability
          SPRINT_MODEL_HINT: ${{ needs.preflight.outputs.model_hint }}
          SPRINT_TASK_ID:    ${{ needs.preflight.outputs.task_id }}
        run: python3 scripts/autonomous_sprint_runner.py

  # ── Job 2: PR Review (PR Review hat) ─────────────────────────────────────
  # C-065: This job is the REVIEWER. Uses REVIEW_APP_TOKEN (different identity).
  # Until REVIEW_APP_TOKEN is provisioned: advisory comment only.
  review:
    name: "PR Review (Platform IT Expert — PR Review hat, C-065)"
    runs-on: ubuntu-latest
    timeout-minutes: 15             # Hard limit: 15 min max for review (FinOps Pattern 4)
    needs: execute
    if: |
      needs.execute.outputs.halt != 'true' &&
      needs.execute.outputs.pr_number != '' &&
      needs.execute.outputs.result == 'SUCCESS'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run PR review
        env:
          # GA-06: REVIEW_APP_TOKEN must be a GitHub App token (different from GITHUB_TOKEN).
          # GitHub enforces: cannot approve a PR using the same token that opened it.
          # Until provisioned: falls back to advisory comment via GITHUB_TOKEN.
          REVIEW_TOKEN:  ${{ secrets.REVIEW_APP_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:     ${{ needs.execute.outputs.pr_number }}
          SPRINT:        ${{ needs.execute.outputs.sprint }}
          GITHUB_REPO:   ${{ github.repository }}
          HAS_REVIEW_TOKEN: ${{ secrets.REVIEW_APP_TOKEN != '' }}
        run: python3 scripts/autonomous_sprint_reviewer.py
