
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAOOAW Hero v08</title>
<style>
:root{
 --blue:#0B66C3;
 --green:#53B826;
 --orange:#F7931E;
 --dark:#1F2F46;
 --bg:#FAFCFE;
}
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Inter,Segoe UI,Arial,sans-serif;
 background:
 radial-gradient(circle at top left,rgba(11,102,195,.08),transparent 35%),
 radial-gradient(circle at top right,rgba(247,147,30,.08),transparent 35%),
 linear-gradient(var(--bg),#fff);
 color:var(--dark);
}
.hero{
 max-width:1400px;
 margin:auto;
 min-height:100vh;
 display:grid;
 grid-template-columns:1fr 1fr;
 align-items:center;
 padding:70px;
 gap:60px;
}
.logo{
 width:180px;
 margin-bottom:25px;
}
h1{
 font-size:72px;
 line-height:1.05;
 margin:0 0 20px;
}
.accent{color:var(--green);}
.sub{
 font-size:30px;
 color:#5b6775;
 margin-bottom:45px;
}
.btns{display:flex;gap:18px}
.btn{
 padding:18px 34px;
 border-radius:14px;
 text-decoration:none;
 font-weight:700;
 transition:.3s;
}
.primary{background:linear-gradient(90deg,var(--blue),#2783df);color:#fff;}
.secondary{border:2px solid var(--orange);color:var(--orange);background:#fff;}
.panel{
 background:#fff;
 border-radius:24px;
 box-shadow:0 20px 60px rgba(0,0,0,.08);
 padding:50px 40px;
}
.timeline{
 display:flex;
 align-items:center;
 justify-content:space-between;
 position:relative;
}
.line{
 position:absolute;
 left:55px;
 right:55px;
 top:28px;
 height:6px;
 background:#e8eef5;
 border-radius:8px;
}
.progress{
 position:absolute;
 left:55px;
 top:28px;
 width:0%;
 height:6px;
 background:linear-gradient(90deg,var(--blue),var(--green),var(--orange));
 transition:1s ease;
 border-radius:8px;
}
.step{
 position:relative;
 width:120px;
 text-align:center;
 z-index:2;
}
.circle{
 width:56px;
 height:56px;
 border-radius:50%;
 border:3px solid #d3dde8;
 background:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
 margin:auto;
 font-weight:bold;
 transition:.4s;
}
.step.active .circle{
 border-color:var(--blue);
 box-shadow:0 0 20px rgba(11,102,195,.25);
 transform:scale(1.08);
}
.step.done .circle{
 color:#fff;
 background:linear-gradient(135deg,var(--blue),var(--green));
 border-color:transparent;
}
.title{margin-top:12px;font-weight:700}
.time{font-size:13px;color:#78838f}
.status{
 margin-top:45px;
 text-align:center;
 font-size:22px;
 font-weight:700;
 color:var(--green);
 min-height:28px;
}
</style>
</head>
<body>
<section class="hero">
<div>
<img class="logo" src="WAOOAW Platform Logo(1).png" alt="Logo" onerror="this.style.display='none'">
<h1>Hire <span class="accent">WAOOAW</span><br>AI Agents</h1>
<div class="sub">Turn Your Business<br><b>from Good to Great.</b></div>
<div class="btns">
<a href="#" class="btn primary">Start Free Trial</a>
<a href="#" class="btn secondary">Watch Demo</a>
</div>
</div>

<div class="panel">
<div class="timeline">
<div class="line"></div>
<div class="progress" id="progress"></div>

<div class="step" id="a">
<div class="circle"></div>
<div class="title">Trial</div>
<div class="time">2 min</div>
</div>

<div class="step" id="b">
<div class="circle"></div>
<div class="title">Hire</div>
<div class="time">2 min</div>
</div>

<div class="step" id="c">
<div class="circle"></div>
<div class="title">Induct</div>
<div class="time">5 min</div>
</div>

<div class="step" id="d">
<div class="circle">🚀</div>
<div class="title">Autonomous</div>
<div class="time">24×7</div>
</div>
</div>
<div class="status" id="status"></div>
</div>
</section>

<script>
const ids=["a","b","c","d"];
const msg=[
"Starting your free trial",
"Hiring your AI Agent",
"Learning your business",
"Working autonomously 24×7"
];
const widths=["0%","33%","66%","100%"];
let i=0;
function animate(){
 ids.forEach((id,idx)=>{
   let s=document.getElementById(id);
   s.className="step";
   let c=s.querySelector(".circle");
   if(idx<3)c.textContent="";
   else c.textContent="🚀";
 });
 for(let j=0;j<i;j++){
   let s=document.getElementById(ids[j]);
   s.classList.add("done");
   if(j<3)s.querySelector(".circle").textContent="✓";
 }
 let cur=document.getElementById(ids[i]);
 cur.classList.add("active");
 if(i<3)cur.querySelector(".circle").textContent="○";
 document.getElementById("progress").style.width=widths[i];
 document.getElementById("status").textContent=msg[i];
 i=(i+1)%4;
}
animate();
setInterval(animate,1800);
</script>
</body>
</html>
